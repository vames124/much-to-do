name: "Backend CI/CD (Golang/Docker)"

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: "eu-west-2"
  GO_VERSION: "1.25.1"

jobs:
  test-and-scan:
    name: "Test and Code Quality"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go Environment
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ./backend/go.sum

      - name: Install Dependencies
        run: go mod download

      - name: Run Unit Tests
        run: go test -v ./...

      # Gosec is a standard defensive tool for finding vulnerabilities in Go code
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...
        # continue-on-error: true # Optional: Uncomment if you don't want strict failures yet

  build-and-deploy:
    name: "Build Docker Image & Deploy to EC2"
    needs: test-and-scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::306980977523:role/GitHubActionsDeployRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push Docker Image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_NAME }}
          IMAGE_TAG: ${{ github.sha }} # Tags the image with the specific Git commit hash
        working-directory: ./backend
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          
          # Tag as latest for the EC2 instances to pull
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Trigger Auto Scaling Group Rolling Update
        # This tells AWS to gracefully cycle out the old EC2 instances and spin up new ones running the latest Docker image.
        # We first cancel any in-progress refresh to avoid InstanceRefreshInProgress errors.
        run: |
          # Check if there's an active instance refresh and cancel it
          ACTIVE_REFRESH=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name ${{ secrets.ASG_NAME }} \
            --query "InstanceRefreshes[?Status=='InProgress' || Status=='Pending' || Status=='Cancelling'].InstanceRefreshId" \
            --output text)

          if [ -n "$ACTIVE_REFRESH" ] && [ "$ACTIVE_REFRESH" != "None" ]; then
            echo "Found active instance refresh: $ACTIVE_REFRESH. Cancelling..."
            aws autoscaling cancel-instance-refresh \
              --auto-scaling-group-name ${{ secrets.ASG_NAME }} || true

            # Wait for the cancellation to complete (max 2 minutes)
            for i in $(seq 1 12); do
              STATUS=$(aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name ${{ secrets.ASG_NAME }} \
                --query "InstanceRefreshes[0].Status" \
                --output text)
              echo "Refresh status: $STATUS"
              if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Successful" ]; then
                echo "Previous refresh cleared."
                break
              fi
              echo "Waiting for cancellation... ($i/12)"
              sleep 10
            done
          fi

          echo "Starting new instance refresh..."
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ secrets.ASG_NAME }} \
            --strategy Rolling \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 60}'